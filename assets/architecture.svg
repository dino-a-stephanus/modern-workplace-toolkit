<svg width="1000" height="520" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Modern Workplace Toolkit deployment architecture</title>
<desc>Four-stage pipeline: Identity via Entra ID, Collaboration via Microsoft 365, Device management via Intune, and Endpoint security via Defender, inside a client tenant boundary, with an optional on-premise AD audit path feeding into Identity.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="500" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="600" fill="#242422">Modern workplace deployment architecture</text>
<text x="500" y="58" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5F5E5A">Identity &#8594; Collaboration &#8594; Device management &#8594; Endpoint security</text>

<!-- Tenant boundary -->
<rect x="50" y="86" width="900" height="304" rx="22" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="1.2" stroke-dasharray="6 5"/>
<text x="74" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="600" fill="#5F5E5A">CLIENT M365 TENANT &#183; GREENFIELD</text>

<!-- ===== Card 1: Identity ===== -->
<g>
  <rect x="80" y="130" width="170" height="216" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <circle cx="100" cy="150" r="13" fill="#3C3489"/>
  <text x="100" y="154" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">1</text>
  <circle cx="165" cy="180" r="24" fill="#534AB7"/>
  <!-- key icon -->
  <circle cx="157" cy="172" r="6.5" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="162" y1="177" x2="176" y2="191" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="171" y1="186" x2="171" y2="192" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="176" y1="191" x2="182" y2="185" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <text x="165" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#3C3489">Identity</text>
  <text x="165" y="242" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" fill="#534AB7">Azure Entra ID</text>
  <text x="165" y="266" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#3C3489">Domain verification</text>
  <text x="165" y="283" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#3C3489">Users &amp; groups</text>
  <text x="165" y="300" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#3C3489">MFA / security defaults</text>
</g>

<!-- ===== Card 2: Collaboration ===== -->
<g>
  <rect x="310" y="130" width="170" height="216" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2"/>
  <circle cx="330" cy="150" r="13" fill="#0C447C"/>
  <text x="330" y="154" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">2</text>
  <circle cx="395" cy="180" r="24" fill="#185FA5"/>
  <!-- envelope icon -->
  <rect x="382" y="171" width="26" height="18" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M383 172 L395 183 L407 172" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="395" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#0C447C">Collaboration</text>
  <text x="395" y="242" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" fill="#185FA5">Microsoft 365</text>
  <text x="395" y="266" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#0C447C">Exchange Online + DKIM</text>
  <text x="395" y="283" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#0C447C">Business Premium licenses</text>
</g>

<!-- ===== Card 3: Device management ===== -->
<g>
  <rect x="540" y="130" width="170" height="216" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <circle cx="560" cy="150" r="13" fill="#085041"/>
  <text x="560" y="154" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">3</text>
  <circle cx="625" cy="180" r="24" fill="#0F6E56"/>
  <!-- laptop icon -->
  <rect x="612" y="169" width="26" height="16" rx="2" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <path d="M607 189 L643 189 L638 193 L612 193 Z" fill="#FFFFFF"/>
  <text x="625" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#085041">Device mgmt</text>
  <text x="625" y="242" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" fill="#0F6E56">Microsoft Intune</text>
  <text x="625" y="266" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#085041">Compliance policies</text>
  <text x="625" y="283" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#085041">Security baseline profiles</text>
</g>

<!-- ===== Card 4: Endpoint security ===== -->
<g>
  <rect x="770" y="130" width="170" height="216" rx="14" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.2"/>
  <circle cx="790" cy="150" r="13" fill="#791F1F"/>
  <text x="790" y="154" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">4</text>
  <circle cx="855" cy="180" r="24" fill="#A32D2D"/>
  <!-- shield-check icon -->
  <path d="M855 166 L866 170 L866 180 C866 188 861 193 855 195 C849 193 844 188 844 180 L844 170 Z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
  <path d="M849 180 L853.5 184.5 L862 175" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="855" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#791F1F">Endpoint security</text>
  <text x="855" y="242" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" fill="#A32D2D">Defender for Endpoint</text>
  <text x="855" y="266" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#791F1F">Anti-phish, Safe Links</text>
  <text x="855" y="283" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#791F1F">ASR rules + audit log</text>
</g>

<!-- Connecting arrows -->
<line x1="250" y1="180" x2="306" y2="180" stroke="#5F5E5A" stroke-width="1.6" marker-end="url(#arrow)"/>
<line x1="480" y1="180" x2="536" y2="180" stroke="#5F5E5A" stroke-width="1.6" marker-end="url(#arrow)"/>
<line x1="710" y1="180" x2="766" y2="180" stroke="#5F5E5A" stroke-width="1.6" marker-end="url(#arrow)"/>

<!-- Legend -->
<g font-family="Segoe UI, Arial, sans-serif" font-size="11.5" fill="#3D3D3A">
  <rect x="90" y="410" width="14" height="14" rx="3" fill="#7F77DD"/>
  <text x="112" y="421">Identity</text>
  <rect x="230" y="410" width="14" height="14" rx="3" fill="#378ADD"/>
  <text x="252" y="421">Collaboration</text>
  <rect x="400" y="410" width="14" height="14" rx="3" fill="#5DCAA5"/>
  <text x="422" y="421">Device management</text>
  <rect x="600" y="410" width="14" height="14" rx="3" fill="#E24B4A"/>
  <text x="622" y="421">Endpoint security</text>
</g>

<!-- Optional hybrid path -->
<rect x="80" y="450" width="200" height="50" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1" stroke-dasharray="4 4"/>
<text x="180" y="470" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" font-weight="600" fill="#444441">Optional hybrid path</text>
<text x="180" y="486" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#5F5E5A">On-premise AD audit</text>
<path d="M180 450 L180 400" fill="none" stroke="#534AB7" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arrow-purple)"/>
</svg>
